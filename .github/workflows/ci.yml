name: CI

on:
  pull_request:
  push:
    branches: [main, 'release/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'

jobs:
  quality:
    name: Format · Lint · Typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm fmt:check
      - run: cargo fmt --all --check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: cargo clippy --workspace --all-targets -- -D warnings

  bindings:
    name: Bindings freshness
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm bindings --check

  test-rust:
    name: Rust tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo test --workspace

  test-js:
    name: Frontend unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  licenses:
    name: License audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm licenses:check

  check-targets:
    name: Tier-1 target compile checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-targets.mjs

  e2e:
    name: E2E (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022] # tauri-driver does not support macOS
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            webkit2gtk-driver xvfb
      - run: pnpm install --frozen-lockfile
      - run: cargo install tauri-driver --locked
      - name: Build the app under test
        # tauri/custom-protocol embeds the production dist — without it a
        # plain cargo build serves the devUrl and the webview shows nothing.
        run: |
          pnpm --filter @lightning/desktop build:web
          cargo build --release -p lightning-desktop --features tauri/custom-protocol
      - name: Run E2E (Linux, under Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm e2e
      - name: Install msedgedriver matching the WebView2 runtime (Windows)
        if: runner.os == 'Windows'
        # The runner's preinstalled msedgedriver tracks Edge, but tauri apps
        # run on the WebView2 runtime, which lags behind — a driver/browser
        # major-version mismatch aborts session creation.
        shell: pwsh
        run: |
          $dir = 'C:\Program Files (x86)\Microsoft\EdgeWebView\Application'
          $wv2 = (Get-ChildItem $dir -Directory |
            Where-Object Name -match '^\d+(\.\d+)+$' |
            Sort-Object { [version]$_.Name } -Descending |
            Select-Object -First 1).Name
          Write-Host "WebView2 runtime: $wv2"
          try {
            Invoke-WebRequest "https://msedgedriver.microsoft.com/$wv2/edgedriver_win64.zip" -OutFile edgedriver.zip
          } catch {
            $major = $wv2.Split('.')[0]
            $txt = (Invoke-WebRequest "https://msedgedriver.microsoft.com/LATEST_RELEASE_${major}_WINDOWS").Content -replace "`0", ''
            $ver = ([regex]'\d+\.\d+\.\d+\.\d+').Match($txt).Value
            Write-Host "Exact driver missing; using latest for major ${major}: $ver"
            Invoke-WebRequest "https://msedgedriver.microsoft.com/$ver/edgedriver_win64.zip" -OutFile edgedriver.zip
          }
          Expand-Archive edgedriver.zip -DestinationPath "$env:RUNNER_TEMP\edgedriver" -Force
          "TAURI_NATIVE_DRIVER=$env:RUNNER_TEMP\edgedriver\msedgedriver.exe" >> $env:GITHUB_ENV
      - name: Run E2E (Windows)
        if: runner.os == 'Windows'
        # wdio.conf.ts hands TAURI_NATIVE_DRIVER to tauri-driver
        # as --native-driver.
        run: pnpm e2e
