name: Nightly

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-matrix:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: 'Windows x64', os: windows-2022, target: x86_64-pc-windows-msvc, tier: 1 }
          - { name: 'Windows ARM64', os: windows-2022, target: aarch64-pc-windows-msvc, tier: 2 }
          - { name: 'Windows x86', os: windows-2022, target: i686-pc-windows-msvc, tier: 3 }
          - { name: 'macOS Apple Silicon', os: macos-14, target: aarch64-apple-darwin, tier: 1 }
          - { name: 'macOS Intel', os: macos-14, target: x86_64-apple-darwin, tier: 1 }
          - { name: 'Linux x64', os: ubuntu-24.04, target: x86_64-unknown-linux-gnu, tier: 1 }
          - {
              name: 'Linux ARM64',
              os: ubuntu-24.04-arm,
              target: aarch64-unknown-linux-gnu,
              tier: 2,
            }
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.tier != 1 }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          LIGHTNING_CHANNEL: nightly
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.target }}
          path: |
            target/release/bundle/**
          if-no-files-found: warn

  os-smoke:
    name: OS smoke tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - run: cargo test --workspace --features os-smoke
