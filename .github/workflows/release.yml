name: Release

on:
  push:
    tags: ['v*']
    # A release/vX.Y.Z cut branch (CLAUDE.md §12) kicks the same pipeline
    # for environments that cannot push tags.
    branches: ['release/v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (x.y.z — must match the repo version)'
        required: true

env:
  CARGO_TERM_COLOR: always
  # 'v0.1.0' (tag) · 'release/v0.1.0' (cut branch) · '0.1.0' (dispatch
  # input) — every consumer strips the optional release/ and v prefixes.
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  version-consistency:
    name: Version consistency
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify one version everywhere matches the tag
        run: |
          REF="${RELEASE_REF#release/}"
          node scripts/sync-version.mjs --check "${REF#v}"

  build:
    name: Build ${{ matrix.name }}
    needs: version-consistency
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: 'Windows x64', os: windows-2022, target: x86_64-pc-windows-msvc, tier: 1 }
          - { name: 'Windows ARM64', os: windows-2022, target: aarch64-pc-windows-msvc, tier: 2 }
          - { name: 'macOS Apple Silicon', os: macos-14, target: aarch64-apple-darwin, tier: 1 }
          - { name: 'macOS Intel', os: macos-14, target: x86_64-apple-darwin, tier: 1 }
          - {
              name: 'Linux x64 (.deb + AppImage)',
              os: ubuntu-24.04,
              target: x86_64-unknown-linux-gnu,
              tier: 1,
            }
          - {
              name: 'Linux ARM64',
              os: ubuntu-24.04-arm,
              target: aarch64-unknown-linux-gnu,
              tier: 2,
            }
    runs-on: ${{ matrix.os }}
    # Tier 1 breakage blocks the release; Tier 2 failures open issues but
    # must not sink the publish job (CLAUDE.md §7).
    continue-on-error: ${{ matrix.tier == 2 }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Add cross target to the pinned toolchain
        # rust-toolchain.toml overrides the toolchain the action prepared,
        # so the pinned toolchain needs the cross target installed too.
        run: rustup target add ${{ matrix.target }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Tauri system deps (Linux)
        if: runner.os == 'Linux'
        # xdg-utils: present on the x64 runner image but missing on the
        # arm64 one, and the AppImage bundler shells out to xdg-mime.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev xdg-utils
      - run: pnpm install --frozen-lockfile
      - name: Build app bundle
        # Explicit --target so every matrix leg produces the arch its
        # artifact name claims (macos-14 and windows-2022 hosts otherwise
        # silently build their host arch). Bundles land in
        # target/<triple>/release/bundle.
        run: pnpm --filter @lightning/desktop exec tauri build --target ${{ matrix.target }}
      # Signing: all keys live exclusively in GitHub Actions secrets (CLAUDE.md §2).
      - name: Sign (Windows Authenticode)
        if: runner.os == 'Windows'
        run: echo "::notice::signtool step — uses secrets.WINDOWS_CERT_*"
      - name: Sign + notarize + staple (macOS)
        if: runner.os == 'macOS'
        run: echo "::notice::codesign/notarytool step — uses secrets.APPLE_*"
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Portable zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "$env:RELEASE_REF" -replace '^release/', '' -replace '^v', ''
          Compress-Archive -Path "target/${{ matrix.target }}/release/lightning-desktop.exe" `
            -DestinationPath "target/${{ matrix.target }}/release/bundle/Lightning_${ver}_${{ matrix.target }}-portable.zip"
      # Only distributable files — uploading bundle/** whole would drag the
      # unpacked .app/appimage trees into the release as loose files.
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/**/*.dmg
            target/${{ matrix.target }}/release/bundle/**/*.deb
            target/${{ matrix.target }}/release/bundle/**/*.rpm
            target/${{ matrix.target }}/release/bundle/**/*.AppImage
            target/${{ matrix.target }}/release/bundle/**/*.exe
            target/${{ matrix.target }}/release/bundle/**/*.msi
            target/${{ matrix.target }}/release/bundle/*.zip
          if-no-files-found: warn

  installer:
    name: Windows installer (embedded payload)
    needs: build
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: actions/download-artifact@v4
        with:
          name: release-x86_64-pc-windows-msvc
          path: installer/windows/payload
      - run: dotnet build installer/windows/Lightning.Installer.sln -c Release
      - run: dotnet test installer/windows -c Release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/Lightning.Installer/bin/Release/**

  publish:
    name: Draft release · manual approval · publish
    needs: [build, installer]
    # Draft the release whenever the Tier-1 bundles built — a broken
    # installer job must not leave a tagged release with no artifacts at
    # all. The draft stays unpublished until a human approves it.
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-24.04
    environment: release # manual approval gate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Generate updater manifests (latest.json per target/arch/channel)
        run: node scripts/gen-latest-json.mjs dist
        env:
          RELEASE_VERSION: ${{ env.RELEASE_REF }}
      - name: Sign updater manifests (minisign)
        run: echo "::notice::minisign step — uses secrets.MINISIGN_SECRET_KEY"
      - name: Compute tag name
        id: tag
        run: |
          REF="${RELEASE_REF#release/}"
          echo "name=v${REF#v}" >> "$GITHUB_OUTPUT"
      - name: Draft GitHub release with Conventional Commits changelog
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          # Explicit tag + commit: on workflow_dispatch github.ref_name is
          # the branch, not a tag. Publishing the draft creates the tag.
          tag_name: ${{ steps.tag.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/**/*
      - name: Open packaging bump PRs (AUR / ebuild / port)
        run: echo "::notice::packaging bump scripts in packaging/"
