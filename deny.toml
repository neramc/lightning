# cargo-deny configuration — GPL-3.0 compatibility gate (CLAUDE.md §16).

[graph]
all-features = true

[licenses]
# Modern SPDX ids only — cargo-deny does not match deprecated ids like
# "GPL-3.0", which silently fails to cover our own GPL-3.0-only crates.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Zlib",
  "BSL-1.0",
  "CC0-1.0",
  "Unicode-3.0",
  "GPL-3.0-only",
  "GPL-3.0-or-later",
  "LGPL-2.1-only",
  "LGPL-2.1-or-later",
  "LGPL-3.0-only",
  "LGPL-3.0-or-later",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace crates reference each other by path without a version; they are
# all publish = false, so this only exempts internal path dependencies.
allow-wildcard-paths = true

[advisories]
yanked = "deny"
# Only flag unmaintained crates the workspace depends on directly. The
# Tauri/wry stack pulls transitively unmaintained crates (gtk3 bindings,
# unic-*, instant, proc-macro-error) with no safe upgrade available.
unmaintained = "workspace"
ignore = [
  # quick-xml 0.39 is reachable only through wayland-scanner, a build-time
  # code generator that parses trusted vendored Wayland protocol XML — never
  # attacker-controlled input. No semver-compatible upgrade exists yet.
  { id = "RUSTSEC-2026-0194", reason = "build-time only via wayland-scanner; input is vendored protocol XML" },
  { id = "RUSTSEC-2026-0195", reason = "build-time only via wayland-scanner; input is vendored protocol XML" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
